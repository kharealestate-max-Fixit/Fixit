# Render Blueprint — one-click deploy of FixIt (web service + managed Postgres).
# Deploy: push this repo to GitHub, then at https://dashboard.render.com
# choose "New +" → "Blueprint" → pick this repo. Render reads this file.
services:
  - type: web
    name: fixit
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fixit-db
          property: connectionString
      - key: NODE_VERSION
        value: "22.12.0"
      # To go fully live later, add these in the Render dashboard
      # (service → Environment): ANTHROPIC_API_KEY, STRIPE_SECRET_KEY,
      # STRIPE_WEBHOOK_SECRET. Left out here so deploy needs no input.

databases:
  - name: fixit-db
    plan: free
